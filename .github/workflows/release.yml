# Release workflow — builds and publishes specflow on tag push.
# Triggered by pushing a tag matching `v*` (e.g. v1.0.0).
name: release

on:
  push:
    tags:
      - "v*"

# `contents: write` is required so goreleaser can create the GitHub release.
permissions:
  contents: write

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history is required for the changelog generation.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          # go.sum lives in specflow-cli/ — point the cache at it.
          cache-dependency-path: specflow-cli/go.sum

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          # Used to create the GitHub release on this repository.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Required to push the Homebrew formula to stormbuf/homebrew-tap
          # (a different repository). Create this secret with a PAT that has
          # `repo` scope on the homebrew-tap repo.
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
