# 多 agent worktree 配置
# 用于多 agent 并行工作场景：为每个 agent 创建独立的 worktree，
# 避免多 agent 在同一工作区互相冲突。
#
# 所有路径均相对于项目根目录

#-------------------------------------------------------------------------------
# worktree 存储路径
#-------------------------------------------------------------------------------

# worktree 的存储目录（相对于项目根目录）
# 建议：将 worktree 放在主仓库之外，避免与主工作区产生冲突
worktree_dir: ../{project}-worktrees

#-------------------------------------------------------------------------------
# 需要复制的文件
#-------------------------------------------------------------------------------

# 创建 worktree 后需要独立复制到每个 worktree 的文件列表
# 这些文件通常包含敏感信息或需要 worktree 独立配置
copy:
  # 开发者身份文件（每个 worktree 需独立持有）
  - .specflow/.developer
  # 环境变量文件（按需取消注释并自定义）
  # - .env
  # - .env.local

#-------------------------------------------------------------------------------
# worktree 创建后执行的命令
#-------------------------------------------------------------------------------

# worktree 创建完成后执行的命令
# 在 worktree 目录内按顺序执行，任一命令失败则中止
post_create:
  # 安装依赖（按实际包管理器取消注释）
  # - npm install
  # - pnpm install --frozen-lockfile
  # - yarn install --frozen-lockfile
  # - pip install -r requirements.txt
  # - bundle install
  # - cargo build
  # - go mod download

#-------------------------------------------------------------------------------
# 合并前的验证检查
#-------------------------------------------------------------------------------

# 合并 worktree 分支前执行的验证检查
# 任一检查失败则阻止合并，确保合并质量
pre_merge:
  # 类型检查（按实际工具链取消注释）
  # - npm run typecheck
  # - pnpm typecheck
  # - mypy .
  # - go vet ./...
  # Lint 检查
  # - npm run lint
  # - pnpm lint
  # - ruff check .
  # - golangci-lint run
  # 测试
  # - npm test
  # - pytest
  # - go test ./...
