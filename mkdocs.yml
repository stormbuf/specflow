site_name: Specflow 使用教程
site_description: Spec 驱动的 AI 编码工作流管理工具
site_url: https://stormbuf.github.io/specflow
repo_url: https://github.com/stormbuf/specflow
repo_name: stormbuf/specflow
edit_uri: edit/main/docs/

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep orange
      accent: teal
      toggle:
        icon: material/weather-night
        name: 切换暗色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep orange
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: 切换亮色模式
  font:
    text: Noto Sans SC
    code: JetBrains Mono

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - toc:
      permalink: true

nav:
  - 首页: index.md
  - 教程:
    - 什么是 Vibe Coding: tutorial/01-what-is-vibe-coding.md
    - Specflow 是什么: tutorial/02-what-is-specflow.md
    - 架构总览: tutorial/03-architecture.md
    - 模块详解: tutorial/04-modules.md
    - 工作流程: tutorial/05-workflow.md
    - 快速上手: tutorial/06-quick-start.md
    - Skill 详解: tutorial/07-skills.md
    - 使用场景: tutorial/08-use-cases.md
    - 实战示例: tutorial/09-example.md
    - 命令速查: tutorial/10-reference.md
